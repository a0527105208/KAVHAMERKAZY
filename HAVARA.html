<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול שלוחות - הקו המרכזי</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/a-/ALV-UjUTwZD_mjMz7ult3rH-xw7KQHK4qtnHEsAv2C_RWpnzq1lVwYo=s240-p-k-rw-no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;800&display=swap');
        
        body { 
            font-family: 'Heebo', sans-serif; 
            background-image: url('https://static.wixstatic.com/media/76027d_4530781278d1453a9f4b34036a47b7e5~mv2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .file-card {
            background: white;
            border-radius: 1.25rem;
            padding: 1rem;
            transition: all 0.3s ease;
            border: 1px solid #edf2f7;
            display: flex;
            flex-direction: column;
            text-align: center;
            height: 100%;
            position: relative;
        }

        .file-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
        }

        .results-container {
            max-height: 70vh; 
            overflow-y: auto;
            padding: 5px;
        }

        .results-container::-webkit-scrollbar {
            width: 6px;
        }
        .results-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e0;
            border-radius: 10px;
        }

        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .file-badge {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: #f1f5f9;
            color: #64748b;
            font-weight: 800;
            font-size: 0.6rem;
            padding: 0.1rem 0.35rem;
            border-radius: 0.4rem;
            border: 1px solid #e2e8f0;
            z-index: 10;
        }

        .menu-container {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            z-index: 20;
        }

        .menu-btn {
            padding: 0.2rem;
            border-radius: 0.4rem;
            color: #94a3b8;
            transition: all 0.2s;
            cursor: pointer;
            background: transparent;
            border: none;
        }

        .menu-btn:hover {
            background: #f8fafc;
            color: #3b82f6;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            min-width: 130px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .dropdown-menu.active {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.5rem 0.75rem;
            font-size: 0.75rem;
            color: #475569;
            width: 100%;
            text-align: right;
            transition: background 0.2s;
            text-decoration: none;
            cursor: pointer;
            border: none;
            background: none;
        }

        .dropdown-item:hover {
            background: #f1f5f9;
            color: #2563eb;
        }

        .play-btn {
            background: #3b82f6;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: all 0.2s;
            cursor: pointer;
        }

        .play-btn:hover {
            background: #2563eb;
            transform: scale(1.05);
        }

        .audio-player-container {
            display: none;
            margin-top: 6px;
            width: 100%;
        }

        .audio-player-container.active {
            display: block;
        }

        audio {
            width: 100%;
            height: 24px;
        }

        #modalOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }
        
        .modal-content {
            background: white;
            padding: 1.5rem;
            border-radius: 1.25rem;
            max-width: 350px;
            width: 90%;
        }

        .nav-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 0.35rem 0.6rem;
            border-radius: 0.6rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: #3b82f6;
            color: #3b82f6;
            background: #f8fafc;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .small-select {
            padding: 0.25rem 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            background: white;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Modal -->
    <div id="modalOverlay">
        <div class="modal-content text-center">
            <h3 id="modalTitle" class="text-lg font-bold text-slate-800 mb-3">בחר שלוחה</h3>
            <input type="text" id="targetExtensionInput" placeholder="לדוגמה: 1/2" class="input-field text-center font-bold mb-4">
            <div class="flex gap-2">
                <button id="modalConfirmBtn" class="flex-1 bg-blue-600 text-white py-2 rounded-xl font-bold hover:bg-blue-700">אישור</button>
                <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-xl font-bold hover:bg-slate-200">ביטול</button>
            </div>
        </div>
    </div>

                    <span id="extType" class="font-bold text-sm">--</span>

            </div>

            <!-- Consolidated Pagination Bar -->
            <div class="flex flex-col sm:flex-row items-center justify-between gap-3 bg-white/60 p-2.5 rounded-2xl border border-white/80 shadow-sm">
                
                <div class="flex items-center gap-2">
                    <span id="rangeLabel" class="text-[11px] text-slate-600 font-bold bg-white px-2 py-1 rounded-lg border border-slate-100"></span>
                    <span id="fileCount" class="text-[10px] text-blue-600 font-extrabold bg-blue-50 px-2 py-1 rounded-lg border border-blue-100">0</span>
                </div>

                <div class="flex items-center gap-2">
                    <div class="flex items-center gap-1 border-l pl-2 border-slate-200">
                        <button onclick="changePage(-1)" id="prevBtn" class="nav-btn" title="הקודמים">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" /></svg>
                        </button>
                        <button onclick="changePage(1)" id="nextBtn" class="nav-btn" title="הבאים">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
                        </button>
                    </div>

                    <div class="flex items-center gap-1">
                        <span class="text-[9px] font-bold text-slate-400">כמות:</span>
                        <select id="filesLimitInput" onchange="fetchData()" class="small-select text-blue-600 border-blue-100">
                            <option value="25" selected>25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                            <option value="500">500</option>
                        </select>
                    </div>

                    <button onclick="resetPagination()" class="nav-btn p-1.5" title="חזרה להתחלה">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    </button>
                </div>
            </div>

            <div class="results-container">
                <div id="fileGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 2xl:grid-cols-10 gap-3 pb-4">
                    <!-- Cards -->
                </div>
            </div>
        </div>

        <div class="text-center pt-2 border-t border-white/20">
            <p class="text-[9px] text-slate-400 font-medium">© פותח עבור הקו המרכזי</p>
        </div>
    </div>

            "remove_id_from_list": "הסרת ערך ID של המתקשר או ערך מוגדר מראש מקובץ במערכת לבחירתכם",
            "yemot_dialer": "שלוחה לניהול קמפיין",
            "sending_sms_and_return": "שליחת sms ללקוח בכניסה לשלוחה ומעבר לשלוחה אחרת",
            "clicks": "השמעת קבצים עם קליקרים, המודול הנוכחי",
            "playfile_and_enter_digits_time": "מודול הפעלת קבצים עם הכנסת מקשים לפי זמן / קליקרים + שידור חי רציף מדומה מרובה קבצים",
            "sip": "שירות המאפשר לקבל חשבון SIP כדי להוציא ולקבל שיחות",
            "digi_call": "שלוחה טלפונית עבור שאלונים",
            "codes": "מודול חלוקת קודים",
            "create_tts": "מודול יצירת קבצי tts",
            "seker_questions": "מודול סקר המבוסס על שאלות סקר",
            "missed_calls": "שלוחה שתשלח סמס/מייל על \"שיחה שלא נענתה\"",
            "change_access_password": "מודול שינוי 'סיסמת גישה' במערכת",
            "change_record_password": "מודול שינוי 'סיסמת הקלטות' במערכת",
            "change_admin_password": "מודול שינוי 'סיסמת ניהול' במערכת",
            "file_to_email": "מודול לשליחת קובץ שבשלוחה, למייל של המתקשר",
            "get_brachot": "מודול למעקב אחר ברכות יומיות",
            "dial_telegram": "שלוחה שתעביר את השיחה כשיחת טלגרם למשתמש טלגרם"
        };

        const CONTACTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSkWP3PGv8y7-gfW6lG6mPy7P7gVrKIlBw6qcyjaqdM46cP60OVZO_8lDb28t6I-zGV9bIdiF-m3ApD/pub?gid=0&single=true&output=csv";
        let contactsMap = new Map();

        function resetPagination() {
            document.getElementById('filesFromInput').value = 0;
            fetchData();
        }

        function changePage(direction) {
            const fromInput = document.getElementById('filesFromInput');
            const limit = parseInt(document.getElementById('filesLimitInput').value);
            let currentFrom = parseInt(fromInput.value) || 0;
            let nextFrom = currentFrom + (direction * limit);
            if (nextFrom < 0) nextFrom = 0;
            fromInput.value = nextFrom;
            fetchData();
        }

        function openModal(title, callback) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalOverlay').style.display = 'flex';
            const input = document.getElementById('targetExtensionInput');
            input.value = "";
            input.focus();
            document.getElementById('modalConfirmBtn').onclick = () => {
                const target = input.value.trim();
                if (target) { callback(target); closeModal(); }
            };
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        window.addEventListener('click', (e) => {
            if (!e.target.closest('.menu-container')) {
                document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active'));
            }
        });

        function toggleMenu(e, id) {
            e.stopPropagation();
            const menu = document.getElementById(`menu-${id}`);
            const isActive = menu.classList.contains('active');
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active'));
            if (!isActive) menu.classList.add('active');
        }

        function togglePlayer(index) {
            const container = document.getElementById(`player-container-${index}`);
            const isVisible = container.classList.contains('active');
            document.querySelectorAll('.audio-player-container').forEach(c => {
                c.classList.remove('active');
                const a = c.querySelector('audio');
                if (a) { a.pause(); a.currentTime = 0; }
            });
            if (!isVisible) {
                container.classList.add('active');
                container.querySelector('audio').play();
            }
        }

        function stripExt(name) { return name ? name.replace(/\.[^/.]+$/, "") : ""; }

        async function performAction(action, fileName, target = null) {
            const system = document.getElementById('systemNumber').value.trim();
            const pass = document.getElementById('password').value.trim();
            const ext = document.getElementById('extension').value.trim();
            let url = `https://www.call2all.co.il/ym/api/FileAction?token=${system}:${pass}&action=${action}&what=ivr2:/${ext}/${fileName}`;
            if (target) url += `&target=ivr2:/${target}`;

            try {
                const res = await fetch(url);
                const d = await res.json();
                if (d.responseStatus === "OK") { fetchData(); } 
                else { alert(d.message || "פעולה נכשלה"); }
            } catch (e) { alert("שגיאת תקשורת"); }
        }

        async function loadContacts() {
            try {
                const res = await fetch(CONTACTS_URL);
                const csv = await res.text();
                csv.split('\n').forEach(line => {
                    const cols = line.split(',');
                    if (cols.length >= 4) {
                        const p = cols[0].trim().replace(/[^0-9]/g, '');
                        const n = cols[3].trim();
                        if (p && n) contactsMap.set(p, n);
                    }
                });
            } catch (e) {}
        }

        async function fetchData() {
            const system = document.getElementById('systemNumber').value.trim();
            const pass = document.getElementById('password').value.trim();
            const ext = document.getElementById('extension').value.trim();
            const from = document.getElementById('filesFromInput').value || 0;
            const limit = document.getElementById('filesLimitInput').value || 25;
            
            const btn = document.getElementById('mainBtn');
            const wrapper = document.getElementById('resultsWrapper');
            const grid = document.getElementById('fileGrid');

            if (!system || !pass || !ext) return;

            btn.disabled = true;
            btn.innerHTML = `<span class="loader"></span>`;
            
            await loadContacts();
            
            const url = `https://www.call2all.co.il/ym/api/GetIVR2Dir?path=ivr2:/${ext}&token=${system}:${pass}&filesFrom=${from}&filesLimit=${limit}`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.responseStatus === "OK") {
                    wrapper.classList.remove('hidden');
                    grid.innerHTML = "";
                    
                    // Display Extension Info with Translation
                    if (data.extIni) {
                        document.getElementById('extTitle').innerText = data.extIni.title || "ללא שם";
                        const rawType = data.extIni.type || "";
                        const translatedType = extensionTypeTranslations[rawType] || rawType || "כללי";
                        document.getElementById('extType').innerText = translatedType;
                    }

                    document.getElementById('prevBtn').disabled = parseInt(from) === 0;

                    if (data.files && data.files.length > 0) {
                        document.getElementById('fileCount').innerText = `סה"כ ${data.files.length}`;
                        document.getElementById('rangeLabel').innerText = `מ ${parseInt(from) + 1} עד ${parseInt(from) + data.files.length}`;
                        
                        data.files.forEach((file, i) => {
                            const phone = file.phone ? file.phone.trim() : "";
                            const cleanP = phone.replace(/[^0-9]/g, '');
                            const num = stripExt(file.name);
                            const fullName = file.name;
                            let title = contactsMap.has(cleanP) ? contactsMap.get(cleanP) : (file.meta?.title ? stripExt(file.meta.title) : num);
                            const download = `https://www.call2all.co.il/ym/api/DownloadFile?token=${system}:${pass}&path=ivr2:/${ext}/${fullName}`;

                            grid.insertAdjacentHTML('beforeend', `
                                <div class="file-card shadow-sm">
                                    <div class="menu-container">
                                        <button onclick="toggleMenu(event, ${i})" class="menu-btn">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                                        </button>
                                        <div id="menu-${i}" class="dropdown-menu">
                                            <a href="${download}" target="_blank" class="dropdown-item">הורדה</a>
                                            <button onclick="openModal('העתקה', (t) => performAction('copy', '${fullName}', t))" class="dropdown-item">העתקה</button>
                                            <button onclick="openModal('העברה', (t) => performAction('move', '${fullName}', t))" class="dropdown-item">העברה</button>
                                            <button onclick="if(confirm('למחוק?')) performAction('delete', '${fullName}')" class="dropdown-item text-red-600">מחיקה</button>
                                        </div>
                                    </div>
                                    <div class="file-badge">${num}</div>
                                    <div class="mt-4 mb-2">
                                        <button onclick="togglePlayer(${i})" class="play-btn">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
                                        </button>
                                        <div id="player-container-${i}" class="audio-player-container">
                                            <audio controls preload="none"><source src="${download}" type="audio/wav"></audio>
                                        </div>
                                    </div>
                                    <h4 class="font-bold text-slate-800 text-[10px] line-clamp-2 mb-2 px-1">${title}</h4>
                                    <div class="mt-auto bg-slate-50 p-1.5 rounded-lg border border-slate-100 space-y-0.5">
                                        <div class="flex justify-between text-[8px] font-bold"><span class="text-slate-400">טל:</span><span class="text-slate-700">${phone || "-"}</span></div>
                                        <div class="flex justify-between text-[8px] border-t border-slate-200 pt-0.5"><span class="text-blue-400">אורך:</span><span class="text-blue-700">${file.durationStr || "-"}</span></div>
                                    </div>
                                </div>
                            `);
                        });
                    } else {
                        grid.innerHTML = "<div class='col-span-full p-10 text-center text-slate-400 text-xs font-bold'>אין קבצים נוספים</div>";
                    }
                }
            } catch (e) { alert("שגיאה בטעינה"); }
            finally { btn.disabled = false; btn.innerText = "טען קבצים"; }
        }
    </script>
</body>
</html>
