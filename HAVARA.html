<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול שלוחות - הקו המרכזי</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/a-/ALV-UjUTwZD_mjMz7ult3rH-xw7KQHK4qtnHEsAv2C_RWpnzq1lVwYo=s240-p-k-rw-no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;800&display=swap');
        
        body { 
            font-family: 'Heebo', sans-serif; 
            background-image: url('https://static.wixstatic.com/media/76027d_4530781278d1453a9f4b34036a47b7e5~mv2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .file-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
            border: 1px solid #edf2f7;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .file-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: #3b82f6;
        }

        .results-container {
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
        }

        .results-container::-webkit-scrollbar {
            width: 6px;
        }
        .results-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="glass max-w-5xl w-full rounded-[2.5rem] p-6 md:p-10 space-y-6">
        
        <!-- Header -->
        <div class="flex flex-col items-center">
            <img src="https://lh3.googleusercontent.com/a-/ALV-UjUTwZD_mjMz7ult3rH-xw7KQHK4qtnHEsAv2C_RWpnzq1lVwYo=s240-p-k-rw-no" alt="Profile" class="w-24 h-24 rounded-full border-4 border-white shadow-xl mb-4">
            <h1 class="text-3xl font-bold text-slate-800">ניהול קבצים</h1>
            <p class="text-blue-600 font-bold tracking-wide uppercase text-xs">הקו המרכזי - לוח בקרה</p>
        </div>

        <!-- Form Section -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-white/40 p-5 rounded-3xl border border-white/50">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1.5 px-1">מספר מערכת</label>
                <input type="text" id="systemNumber" value="033137787" class="input-field text-center font-bold">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1.5 px-1">סיסמה</label>
                <input type="password" id="password" value="8549052" class="input-field text-center font-bold">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1.5 px-1">שלוחה</label>
                <input type="text" id="extension" value="6/7" class="input-field text-center font-bold">
            </div>
        </div>

        <button onclick="fetchData()" id="mainBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 text-lg">
            טען נתונים מהמערכת
        </button>

        <!-- Stats & Results Section -->
        <div id="resultsWrapper" class="hidden space-y-4">
            <div class="flex justify-between items-center px-2">
                <h3 class="font-bold text-slate-700 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                    </svg>
                    קבצים בשלוחה
                </h3>
                <span id="fileCount" class="bg-blue-100 text-blue-700 text-sm font-bold px-4 py-1.5 rounded-full shadow-sm border border-blue-200">
                    סה"כ: 0 קבצים
                </span>
            </div>

            <div class="results-container">
                <div id="fileGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 pb-4">
                    <!-- Cards will be injected here -->
                </div>
            </div>
        </div>

        <div class="text-center pt-4 border-t border-white/20">
            <p class="text-[11px] text-slate-400 font-medium">© פותח עבור הקו המרכזי | API ימות המשיח</p>
        </div>
    </div>

    <script>
        const CONTACTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSkWP3PGv8y7-gfW6lG6mPy7P7gVrKIlBw6qcyjaqdM46cP60OVZO_8lDb28t6I-zGV9bIdiF-m3ApD/pub?gid=0&single=true&output=csv";
        let contactsMap = new Map();

        // Remove file extension from string
        function stripExtension(filename) {
            return filename.replace(/\.[^/.]+$/, "");
        }

        async function loadContacts() {
            try {
                const response = await fetch(CONTACTS_URL);
                const csvText = await response.text();
                const lines = csvText.split('\n');
                
                contactsMap.clear();
                
                lines.forEach(line => {
                    const columns = line.split(',');
                    if (columns.length >= 4) {
                        const phone = columns[0].trim().replace(/[^0-9]/g, '');
                        const name = columns[3].trim();
                        if (phone && name) {
                            contactsMap.set(phone, name);
                        }
                    }
                });
            } catch (error) {
                console.error("שגיאה בטעינת אנשי קשר:", error);
            }
        }

        async function fetchData() {
            const system = document.getElementById('systemNumber').value.trim();
            const pass = document.getElementById('password').value.trim();
            const ext = document.getElementById('extension').value.trim();
            const btn = document.getElementById('mainBtn');
            const wrapper = document.getElementById('resultsWrapper');
            const grid = document.getElementById('fileGrid');
            const countLabel = document.getElementById('fileCount');

            if (!system || !pass || !ext) {
                alert("נא למלא את כל השדות");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `טוען נתונים...`;

            await loadContacts();
            
            const url = `https://www.call2all.co.il/ym/api/GetIVR2Dir?path=ivr2:/${ext}&token=${system}:${pass}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.responseStatus === "OK") {
                    grid.innerHTML = "";
                    wrapper.classList.remove('hidden');

                    if (data.files && data.files.length > 0) {
                        countLabel.innerText = `סה"כ: ${data.files.length} קבצים`;
                        
                        data.files.forEach(file => {
                            const phone = file.phone ? file.phone.trim() : "";
                            const cleanPhone = phone.replace(/[^0-9]/g, '');
                            
                            let title = "";
                            if (contactsMap.has(cleanPhone)) {
                                title = contactsMap.get(cleanPhone);
                            } else if (file.meta && file.meta.title) {
                                title = stripExtension(file.meta.title);
                            } else {
                                title = stripExtension(file.name);
                            }

                            const displayPhone = phone || "לא זמין";
                            const time = file.date || file.mtime || "---";
                            const duration = file.durationStr || "--:--";
                            
                            const card = `
                                <div class="file-card shadow-md">
                                    <div class="flex justify-center mb-2">
                                        <div class="bg-blue-100 p-3 rounded-2xl">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                                            </svg>
                                        </div>
                                    </div>
                                    
                                    <div class="flex-grow flex items-center justify-center py-4">
                                        <h4 class="font-extrabold text-slate-900 text-xl leading-tight" title="${title}">
                                            ${title}
                                        </h4>
                                    </div>

                                    <div class="space-y-2 bg-slate-50 p-3 rounded-xl border border-slate-100">
                                        <div class="flex justify-between items-center text-xs">
                                            <span class="text-slate-400 font-bold">טלפון:</span>
                                            <span class="text-slate-700 font-bold">${displayPhone}</span>
                                        </div>
                                        <div class="flex justify-between items-center text-xs">
                                            <span class="text-slate-400 font-bold">תאריך:</span>
                                            <span class="text-slate-600">${time}</span>
                                        </div>
                                        <div class="flex justify-between items-center pt-2 border-t border-slate-200">
                                            <span class="text-[10px] font-black uppercase text-blue-400 tracking-tighter italic">אורך הקלטה</span>
                                            <span class="text-sm font-black text-blue-700">${duration}</span>
                                        </div>
                                    </div>
                                    
                                    <div class="mt-3 text-[9px] text-slate-300 font-mono">
                                        קובץ: ${file.name}
                                    </div>
                                </div>
                            `;
                            grid.innerHTML += card;
                        });
                    } else {
                        countLabel.innerText = `סה"כ: 0 קבצים`;
                        grid.innerHTML = "<div class='col-span-full p-12 text-center text-slate-400 italic font-bold'>אין קבצים בשלוחה זו</div>";
                    }
                } else {
                    alert("שגיאה: " + (data.message || "לא ניתן למשוך נתונים"));
                }
            } catch (error) {
                console.error(error);
                alert("שגיאת חיבור לשרת ימות המשיח");
            } finally {
                btn.disabled = false;
                btn.innerText = "טען נתונים מהמערכת";
            }
        }
    </script>

</body>
</html>
