<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הוספת משתמשים - הקו המרכזי</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/a-/ALV-UjUTwZD_mjMz7ult3rH-xw7KQHK4qtnHEsAv2C_RWpnzq1lVwYo=s240-p-k-rw-no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&display=swap');
        
        body { 
            font-family: 'Heebo', sans-serif; 
            background-image: url('https://static.wixstatic.com/media/76027d_4530781278d1453a9f4b34036a47b7e5~mv2.jpg');
            background-size: 100% 120%; 
            background-position: top center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .profile-img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .step-transition {
            transition: all 0.4s ease-in-out;
        }

        .hidden-step {
            display: none;
            opacity: 0;
            transform: translateY(10px);
        }

        .active-step {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .text-center::placeholder {
            text-align: center;
        }

        .scroll-custom::-webkit-scrollbar { width: 5px; }
        .scroll-custom::-webkit-scrollbar-track { background: transparent; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="mainContainer" class="glass max-w-md w-full rounded-[2.5rem] p-8 space-y-6 relative overflow-hidden transition-all duration-500">
        
        <!-- Header -->
        <div class="flex flex-col items-center">
            <div class="relative mb-3">
                <a href="index.html" title="חזרה לדף הבית">
                    <img src="https://lh3.googleusercontent.com/a-/ALV-UjUTwZD_mjMz7ult3rH-xw7KQHK4qtnHEsAv2C_RWpnzq1lVwYo=s240-p-k-rw-no" alt="User Profile" class="profile-img rounded-full bg-white">
                </a>
            </div>
            <div class="text-center">
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">הוספת משתמשים</h1>
                <p class="text-blue-600 text-xs font-bold mt-1 uppercase tracking-wider">חיבור מספרים לקו המרכזי</p>
            </div>
        </div>

        <!-- Step 1: System Details -->
        <div id="step1" class="active-step step-transition space-y-4">
            <div class="bg-blue-50/50 p-5 rounded-2xl border border-blue-100 space-y-4">
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-slate-600 pr-1">שם מערכת</label>
                    <input type="text" id="sys_num" value="033137787" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-center font-bold">
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-slate-600 pr-1">סיסמא</label>
                    <input type="password" id="sys_pass" value="8549052" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-center font-bold">
                </div>
            </div>
            <div class="space-y-2">
                <button onclick="goToStep(2)" class="w-full bg-slate-800 hover:bg-black text-white font-bold py-3.5 rounded-xl transition-all shadow-md">
                    הוספת מספר
                </button>
                <button onclick="openListManager()" class="w-full bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 font-bold py-3 rounded-xl transition-all">
                    לרשימת המספרים המחוברים
                </button>
            </div>
        </div>

        <!-- Step 2: Phone Type Selection -->
        <div id="step2" class="hidden-step step-transition space-y-4">
            <p class="text-sm font-bold text-slate-600 text-center">בחר את סוג המספר להוספה:</p>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="openForm('ישראלי')" class="group flex items-center justify-between px-5 py-4 bg-white border border-slate-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition-all shadow-sm">
                    <span class="font-bold text-slate-700 group-hover:text-blue-700">מספר ישראלי</span>
                    <span class="text-xl">🇮🇱</span>
                </button>
                <button onclick="openForm('אירופאי')" class="group flex items-center justify-between px-5 py-4 bg-white border border-slate-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition-all shadow-sm">
                    <span class="font-bold text-slate-700 group-hover:text-blue-700">מספר אירופאי</span>
                    <span class="text-xl">🇪🇺</span>
                </button>
                <button onclick="openForm('אמריקאי')" class="group flex items-center justify-between px-5 py-4 bg-white border border-slate-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition-all shadow-sm">
                    <span class="font-bold text-slate-700 group-hover:text-blue-700">מספר אמריקאי</span>
                    <span class="text-xl">🇺🇸</span>
                </button>
            </div>
            <button onclick="goToStep(1)" class="w-full text-xs text-slate-500 hover:text-slate-800 transition-colors font-medium">חזור לשלב הקודם</button>
        </div>

        <!-- Step 3: Add User Form -->
        <div id="step3" class="hidden-step step-transition space-y-5">
            <div class="text-center space-y-1">
                <span id="selectedTypeLabel" class="inline-block px-3 py-1 bg-blue-100 text-blue-700 text-[10px] font-bold rounded-full uppercase">מספר ישראלי</span>
                <h3 class="text-lg font-bold text-slate-800">פרטי משתמש חדש</h3>
            </div>
            
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-slate-600 text-center px-1">שם מלא / כינוי</label>
                    <input type="text" id="user_name" placeholder="הכנס שם..." class="w-full px-4 py-3 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all font-bold text-center">
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-slate-600 text-center px-1">מספר טלפון</label>
                    <input type="text" id="user_phone" placeholder="הכנס מספר..." class="w-full px-4 py-3 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all font-bold text-center" dir="ltr">
                </div>
            </div>

            <div id="errorMessage" class="hidden p-3 bg-red-100 text-red-800 text-xs rounded-xl font-bold text-center border border-red-200"></div>

            <div class="flex gap-2 pt-2">
                <button id="submitBtn" onclick="submitUser()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all active:scale-95 disabled:opacity-50">
                    <span id="btnText">הוסף למערכת</span>
                    <span id="btnLoader" class="hidden"><span class="loader"></span>מעבד...</span>
                </button>
                <button onclick="goToStep(2)" class="px-4 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl transition-all">
                    ביטול
                </button>
            </div>
        </div>

        <!-- List Manager Overlay -->
        <div id="listManager" class="hidden-step step-transition space-y-4">
            <div class="flex items-center justify-between mb-2">
                <h3 class="font-bold text-slate-800">ניהול רשימת מספרים</h3>
                <button onclick="addRow()" class="text-xs bg-green-600 text-white px-2 py-1 rounded-md font-bold">+ הוסף שורה</button>
            </div>
            <input type="text" id="listSearch" oninput="filterList()" placeholder="חיפוש לפי שם או מספר..." class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400">
            
            <div class="max-h-64 overflow-y-auto border border-slate-100 rounded-xl scroll-custom bg-white/50">
                <table class="w-full text-sm text-right">
                    <thead class="bg-slate-100 text-slate-600 sticky top-0">
                        <tr>
                            <th class="p-2 font-bold">שם</th>
                            <th class="p-2 font-bold text-center">מספר</th>
                        </tr>
                    </thead>
                    <tbody id="listTableBody">
                        <!-- Data rows injected here -->
                    </tbody>
                </table>
            </div>

            <div class="flex gap-2 pt-2">
                <button id="saveListBtn" onclick="saveList()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl shadow transition-all">
                    שמור שינויים בשרת
                </button>
                <button onclick="goToStep(1)" class="px-4 bg-slate-200 text-slate-700 rounded-xl">חזור</button>
            </div>
        </div>

        <!-- Success Message -->
        <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-2xl shadow-2xl z-50 animate-bounce">
            הפעולה הושלמה בהצלחה!
        </div>

    </div>

    <script>
        let selectedPhoneType = '';
        let rawPhoneNumber = '';
        let listData = []; // Array of {phone, name}

        function goToStep(stepNumber) {
            const container = document.getElementById('mainContainer');
            // אם אנחנו עוברים לרשימה, נגדיל קצת את הרוחב
            if (stepNumber === 'list') {
                container.classList.replace('max-w-md', 'max-w-xl');
            } else {
                container.classList.replace('max-w-xl', 'max-w-md');
            }

            ['step1', 'step2', 'step3', 'listManager'].forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.classList.remove('active-step');
                    el.classList.add('hidden-step');
                }
            });

            const targetId = (stepNumber === 'list') ? 'listManager' : 'step' + stepNumber;
            const target = document.getElementById(targetId);
            target.classList.remove('hidden-step');
            setTimeout(() => target.classList.add('active-step'), 10);
            document.getElementById('errorMessage').classList.add('hidden');
        }

        async function openListManager() {
            const systemNum = document.getElementById('sys_num').value;
            const password = document.getElementById('sys_pass').value;
            
            if(!systemNum || !password) {
                alert("יש להזין פרטי מערכת תחילה");
                return;
            }

            try {
                goToStep('list');
                const body = document.getElementById('listTableBody');
                body.innerHTML = '<tr><td colspan="2" class="p-4 text-center">טוען נתונים...</td></tr>';
                
                const contents = await getFileContents(systemNum, password, "ivr2:EnterID/EnterIDValName.ini");
                listData = contents.split('\n')
                    .filter(line => line.includes('='))
                    .map(line => {
                        const [phone, name] = line.split('=');
                        return { phone: phone.trim(), name: name.trim() };
                    });
                
                renderTable(listData);
            } catch (err) {
                alert("שגיאה בטעינת הרשימה: " + err.message);
                goToStep(1);
            }
        }

        function renderTable(data) {
            const body = document.getElementById('listTableBody');
            body.innerHTML = '';
            data.forEach((item, index) => {
                const row = document.createElement('tr');
                row.className = "border-b border-slate-50 hover:bg-blue-50/30 transition-colors";
                row.innerHTML = `
                    <td class="p-1"><input type="text" value="${item.name}" onchange="updateListItem(${index}, 'name', this.value)" class="w-full bg-transparent p-1 outline-none focus:bg-white rounded"></td>
                    <td class="p-1"><input type="text" value="${item.phone}" onchange="updateListItem(${index}, 'phone', this.value)" class="w-full bg-transparent p-1 outline-none focus:bg-white rounded text-center font-mono" dir="ltr"></td>
                `;
                body.appendChild(row);
            });
        }

        function updateListItem(index, field, value) {
            listData[index][field] = value;
        }

        function addRow() {
            listData.unshift({ phone: '', name: '' });
            renderTable(listData);
        }

        function filterList() {
            const term = document.getElementById('listSearch').value.toLowerCase();
            const filtered = listData.filter(i => i.name.toLowerCase().includes(term) || i.phone.includes(term));
            renderTable(filtered);
        }

        async function saveList() {
            const systemNum = document.getElementById('sys_num').value;
            const password = document.getElementById('sys_pass').value;
            const btn = document.getElementById('saveListBtn');
            
            btn.disabled = true;
            btn.innerText = 'שומר...';

            try {
                const contents = listData
                    .filter(i => i.phone && i.name)
                    .map(i => `${i.phone}=${i.name}`)
                    .join('\n');
                
                await uploadFile(systemNum, password, "ivr2:EnterID/EnterIDValName.ini", contents);
                showToast();
            } catch (err) {
                alert("שגיאה בשמירה: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'שמור שינויים בשרת';
            }
        }

        function openForm(type) {
            selectedPhoneType = type;
            const phoneInput = document.getElementById('user_phone');
            rawPhoneNumber = '';
            phoneInput.value = '';
            
            document.getElementById('selectedTypeLabel').innerText = "מספר " + type;
            document.getElementById('user_name').value = '';
            
            if (type === 'ישראלי') {
                phoneInput.placeholder = "לדוג' 050-0000000";
            } else if (type === 'אמריקאי') {
                phoneInput.placeholder = "לדוג' 1-718-000-0000";
            } else if (type === 'אירופאי') {
                phoneInput.placeholder = "לדוג' 44000-000-000";
            }
            
            goToStep(3);
        }

        document.getElementById('user_phone').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            rawPhoneNumber = value;
            
            if (selectedPhoneType === 'אמריקאי') {
                if (value.length > 0 && value[0] !== '1') {
                    value = '1' + value;
                    rawPhoneNumber = value;
                }
                let formatted = "";
                if (value.length > 0) formatted += value.substring(0, 1);
                if (value.length > 1) formatted += "-" + value.substring(1, 4);
                if (value.length > 4) formatted += "-" + value.substring(4, 7);
                if (value.length > 7) formatted += "-" + value.substring(7, 11);
                e.target.value = formatted;

            } else if (selectedPhoneType === 'אירופאי') {
                let formatted = "";
                if (value.startsWith('44')) {
                    formatted = value.substring(0, 6);
                    if (value.length > 6) formatted += "-" + value.substring(6, 9);
                    if (value.length > 9) formatted += "-" + value.substring(9, 12);
                } else if (value.startsWith('323')) {
                    formatted = value.substring(0, 3);
                    if (value.length > 3) formatted += "-" + value.substring(3, 6);
                    if (value.length > 6) formatted += "-" + value.substring(6, 8);
                    if (value.length > 8) formatted += "-" + value.substring(8, 10);
                } else if (value.startsWith('32')) {
                    formatted = value.substring(0, 5);
                    if (value.length > 5) formatted += "-" + value.substring(5, 8);
                    if (value.length > 8) formatted += "-" + value.substring(8, 11);
                } else if (value.startsWith('43')) {
                    formatted = value.substring(0, 5);
                    if (value.length > 5) formatted += "-" + value.substring(5, 9);
                    if (value.length > 9) formatted += "-" + value.substring(9, 14);
                } else if (value.startsWith('41')) {
                    formatted = value.substring(0, 5);
                    if (value.length > 5) formatted += "-" + value.substring(5, 8);
                    if (value.length > 8) formatted += "-" + value.substring(8, 11);
                } else {
                    formatted = value;
                }
                e.target.value = formatted;

            } else if (selectedPhoneType === 'ישראלי') {
                let formatted = value;
                if (value.startsWith('05')) {
                    if (value.length > 3) formatted = value.slice(0, 3) + '-' + value.slice(3, 10);
                } else if (['02', '03', '04', '08', '09'].some(p => value.startsWith(p))) {
                    if (value.length > 2) formatted = value.slice(0, 2) + '-' + value.slice(2, 9);
                } else if (value.startsWith('07')) {
                    if (value.length > 4) formatted = value.slice(0, 4) + '-' + value.slice(4, 10);
                }
                e.target.value = formatted;
            } else {
                e.target.value = value;
            }
        });

        async function submitUser() {
            const name = document.getElementById('user_name').value;
            const phone = rawPhoneNumber;
            const systemNum = document.getElementById('sys_num').value;
            const password = document.getElementById('sys_pass').value;

            if (!name || !phone) {
                showError("נא למלא את כל הפרטים");
                return;
            }

            if (selectedPhoneType === 'אירופאי') {
                const p = phone;
                if ((p.startsWith('44') && p.length < 12) || (p.startsWith('323') && p.length < 10) || 
                    (p.startsWith('32') && p.length < 11) || (p.startsWith('43') && p.length < 14) || 
                    (p.startsWith('41') && p.length < 11)) {
                    return showError("אורך מספר לא תקין למדינה שנבחרה");
                }
            }

            if (selectedPhoneType === 'אמריקאי' && phone.length < 11) return showError("מספר אמריקאי חייב לכלול 11 ספרות");
            if (selectedPhoneType === 'ישראלי' && (phone.length < 9 || phone.length > 10)) return showError("מספר ישראלי לא תקין");

            setLoading(true);

            try {
                let phoneVariations = [phone];
                if (selectedPhoneType === 'אמריקאי') phoneVariations.push('0' + phone);
                else if (selectedPhoneType === 'אירופאי') phoneVariations.push('0' + phone.substring(2));

                const file1Path = "ivr2:EnterID/EnterIDValName.ini";
                let file1Data = await getFileContents(systemNum, password, file1Path);
                const existing1 = phoneVariations.filter(p => new RegExp(`^${p}=`, "m").test(file1Data));

                if (existing1.length === phoneVariations.length) {
                    showError(`המספר כבר מופיע במערכת`);
                    setLoading(false);
                    return;
                }

                let updated1 = file1Data.trimEnd() + "\n";
                phoneVariations.forEach(p => { if (!existing1.includes(p)) updated1 += `${p}=${name}\n`; });
                await uploadFile(systemNum, password, file1Path, updated1);

                const file2Path = "ivr2:WhiteList.ini";
                let file2Data = await getFileContents(systemNum, password, file2Path);
                const existing2 = phoneVariations.filter(p => new RegExp(`^${p}$`, "m").test(file2Data));
                let updated2 = file2Data.trimEnd() + "\n";
                phoneVariations.forEach(p => { if (!existing2.includes(p)) updated2 += `${p}\n`; });
                await uploadFile(systemNum, password, file2Path, updated2);

                showToast();
                setTimeout(() => { goToStep(2); setLoading(false); }, 2000);
            } catch (err) {
                showError("שגיאה: " + err.message);
                setLoading(false);
            }
        }

        async function getFileContents(token_num, token_pass, path) {
            const url = `https://www.call2all.co.il/ym/api/GetTextFile?token=${token_num}:${token_pass}&what=${path}`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.responseStatus !== "OK") throw new Error(`שגיאה בקריאה`);
            return data.contents || "";
        }

        async function uploadFile(token_num, token_pass, path, contents) {
            const url = `https://www.call2all.co.il/ym/api/UploadTextFile?token=${token_num}:${token_pass}&what=${path}`;
            const params = new URLSearchParams();
            params.append('contents', contents);
            const response = await fetch(url, { method: 'POST', body: params });
            const result = await response.json();
            if (result.responseStatus !== "OK") throw new Error(`שגיאה בכתיבה`);
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerText = msg;
            errorDiv.classList.remove('hidden');
        }

        function setLoading(isLoading) {
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = isLoading;
            if (isLoading) { btnText.classList.add('hidden'); btnLoader.classList.remove('hidden'); }
            else { btnText.classList.remove('hidden'); btnLoader.classList.add('hidden'); }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }
    </script>
</body>
</html>
