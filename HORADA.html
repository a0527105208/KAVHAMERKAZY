<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מוריד קבצים - קו המרכזי</title>
    <!-- Favicon setting -->
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/a-/ALV-UjUTwZD_mjMz7ult3rH-xw7KQHK4qtnHEsAv2C_RWpnzq1lVwYo=s240-p-k-rw-no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&display=swap');
        
        body { 
            font-family: 'Heebo', sans-serif; 
            background-image: url('https://static.wixstatic.com/media/76027d_4530781278d1453a9f4b34036a47b7e5~mv2.jpg');
            background-size: 100% 120%; 
            background-position: top center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .profile-img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        /* הסרת חיצי מספרים כדי לשמור על עיצוב נקי */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* סרגל גלילה מותאם אישי ללוג */
        #statusLog::-webkit-scrollbar {
            width: 4px;
        }
        #statusLog::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
        }
        #statusLog::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="glass max-w-md w-full rounded-[2rem] p-8 space-y-6 relative overflow-hidden">
        
        <!-- Header Section -->
        <div class="flex flex-col items-center">
            <div class="relative mb-4">
                <a href="index.html" title="חזרה לדף הבית">
                    <img src="https://lh3.googleusercontent.com/a-/ALV-UjUTwZD_mjMz7ult3rH-xw7KQHK4qtnHEsAv2C_RWpnzq1lVwYo=s240-p-k-rw-no" alt="User Profile" class="profile-img rounded-full bg-white">
                </a>
            </div>
            <div class="text-center">
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">מוריד קבצים</h1>
                <p class="text-blue-700 font-bold text-sm mt-1 opacity-90">פותח על ידי יצחק לרנר עבור הקו המרכזי - אור חדש</p>
            </div>
        </div>

        <!-- Form Section -->
        <div class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-slate-600 px-1">מספר מערכת</label>
                    <input type="text" id="system_number" value="033137787" class="w-full px-4 py-2.5 bg-white/60 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                </div>
                <div class="space-y-1 relative">
                    <label class="block text-xs font-bold text-slate-600 px-1">סיסמה</label>
                    <div class="relative">
                        <input type="password" id="password" value="8549052" class="w-full px-4 py-2.5 bg-white/60 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                        <button type="button" onclick="togglePassword()" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition-colors">
                            <!-- Eye Icon -->
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <!-- Eye Off Icon (hidden by default) -->
                            <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-600 px-1">שלוחה</label>
                    <input type="text" id="shluha" placeholder="לדוג' 3/04/1" class="w-full px-2 py-2.5 bg-white/60 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-center font-bold text-sm">
                </div>
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-600 px-1">מ-קובץ</label>
                    <input type="number" id="start" placeholder="לדוג' 000" class="w-full px-2 py-2.5 bg-white/60 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-center text-sm font-bold">
                </div>
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-600 px-1">עד-קובץ</label>
                    <input type="number" id="end" placeholder="לדוג' 9999" class="w-full px-2 py-2.5 bg-white/60 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-center text-sm font-bold">
                </div>
            </div>

            <button onclick="startDownload()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transform transition active:scale-95 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                התחל הורדה מרובה
            </button>
        </div>

        <!-- Progress Feedback -->
        <div id="progressContainer" class="hidden space-y-3 pt-2">
            <div class="flex justify-between text-xs font-bold text-slate-700">
                <span id="progressText">מוריד קבצים...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="w-full bg-slate-200/50 rounded-full h-2.5 shadow-inner overflow-hidden">
                <div id="progressBar" class="bg-gradient-to-r from-blue-500 to-indigo-600 h-full transition-all duration-300 rounded-full" style="width: 0%"></div>
            </div>
            <div id="statusLog" class="text-[10px] text-slate-500 max-h-24 overflow-y-auto mt-2 bg-white/40 p-3 rounded-xl border border-white/20 font-mono leading-relaxed">
                ממתין לפקודה...
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            const eyeOffIcon = document.getElementById('eyeOffIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        }

        async function startDownload() {
            const systemNum = document.getElementById('system_number').value;
            const password = document.getElementById('password').value;
            const shluha = document.getElementById('shluha').value;
            
            const startVal = document.getElementById('start').value;
            const endVal = document.getElementById('end').value;
            
            const start = parseInt(startVal !== "" ? startVal : "0");
            const end = parseInt(endVal !== "" ? endVal : "9999");
            
            const btn = document.getElementById('btn');
            const log = document.getElementById('statusLog');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            const container = document.getElementById('progressContainer');

            const token = `${systemNum}:${password}`;

            if (!systemNum || !password || !shluha) {
                alert("נא למלא את כל השדות בצורה תקינה");
                return;
            }

            container.classList.remove('hidden');
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            log.innerHTML = '';
            
            const total = end - start + 1;
            let count = 0;

            for (let i = start; i <= end; i++) {
                let formattedNum = i < 1000 ? i.toString().padStart(3, '0') : i.toString();
                let url = `https://www.call2all.co.il/ym/api/DownloadFile?token=${token}&path=ivr2:/${shluha}/${formattedNum}.wav`;
                
                const entry = document.createElement('div');
                entry.className = "mb-1";
                entry.textContent = `> מוריד: ${formattedNum}.wav`;
                log.appendChild(entry);
                log.scrollTop = log.scrollHeight;

                try {
                    const response = await fetch(url);
                    if (response.ok) {
                        const blob = await response.blob();
                        const downloadUrl = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = downloadUrl;
                        a.download = `${formattedNum}.wav`;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        window.URL.revokeObjectURL(downloadUrl);
                    } else {
                        entry.classList.add('text-orange-500');
                        entry.textContent += " [דילוג - לא קיים]";
                    }
                } catch (e) {
                    entry.classList.add('text-red-500');
                    entry.textContent += " [שגיאת תקשורת]";
                }

                count++;
                let percent = Math.round((count / total) * 100);
                progressBar.style.width = percent + '%';
                progressPercent.innerText = percent + '%';
                
                // השהיית בטיחות כדי למנוע קריסת דפדפן ולכבד מגבלות קצב
                await new Promise(r => setTimeout(r, 650));
            }

            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            const finalMsg = document.createElement('div');
            finalMsg.className = "text-blue-600 font-bold mt-2 border-t border-blue-100 pt-1";
            finalMsg.textContent = "המשימה הושלמה בהצלחה!";
            log.appendChild(finalMsg);
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
